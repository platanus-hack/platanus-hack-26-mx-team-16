<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="600" height="320" fill="#f8fafc"/>

  <!-- Concentric rings -->
  <rect x="220" y="20" width="160" height="280" fill="#0d9488" fill-opacity="0.05" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="4 3" rx="6"/>
  <text x="300" y="14" text-anchor="middle" font-weight="600" fill="#0d9488">presentation →</text>

  <rect x="180" y="50" width="240" height="220" fill="#0d9488" fill-opacity="0.08" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="4 3" rx="6"/>
  <text x="300" y="44" text-anchor="middle" font-weight="600" fill="#0d9488">application ←</text>

  <rect x="140" y="80" width="320" height="160" fill="#0d9488" fill-opacity="0.12" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="4 3" rx="6"/>
  <text x="300" y="74" text-anchor="middle" font-weight="600" fill="#0d9488">infrastructure ←</text>

  <rect x="100" y="110" width="400" height="100" fill="white" stroke="#0d9488" stroke-width="1.5" rx="6"/>
  <text x="300" y="104" text-anchor="middle" font-weight="600" fill="#0d9488">domain (pure)</text>

  <!-- Domain blocks -->
  <rect x="120" y="125" width="170" height="30" fill="#ccfbf1" stroke="#0d9488" rx="4"/>
  <text x="205" y="145" text-anchor="middle" fill="#0f172a">Entities</text>

  <rect x="310" y="125" width="170" height="30" fill="#ccfbf1" stroke="#0d9488" rx="4"/>
  <text x="395" y="145" text-anchor="middle" fill="#0f172a">Value Objects</text>

  <rect x="215" y="170" width="170" height="30" fill="#ccfbf1" stroke="#0d9488" rx="4"/>
  <text x="300" y="190" text-anchor="middle" fill="#0f172a">Repository interfaces</text>

  <!-- Infrastructure block -->
  <rect x="160" y="95" width="280" height="30" fill="#fef3c7" stroke="#b45309" rx="4"/>
  <text x="300" y="115" text-anchor="middle" fill="#0f172a">SQLAlchemy repositories</text>

  <!-- Application block -->
  <rect x="200" y="65" width="200" height="30" fill="#dbeafe" stroke="#1d4ed8" rx="4"/>
  <text x="300" y="85" text-anchor="middle" fill="#0f172a">Use cases (commands/queries)</text>

  <!-- Presentation block -->
  <rect x="240" y="35" width="120" height="30" fill="#fee2e2" stroke="#b91c1c" rx="4"/>
  <text x="300" y="55" text-anchor="middle" fill="#0f172a">FastAPI router</text>

  <!-- Arrows -->
  <line x1="300" y1="35" x2="300" y2="65" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="300" y1="65" x2="300" y2="95" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="300" y1="95" x2="300" y2="110" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Side labels -->
  <text x="20" y="160" font-weight="600" fill="#0f172a">Inbound</text>
  <text x="20" y="178" fill="#475569"">HTTP</text>

  <text x="540" y="160" font-weight="600" fill="#0f172a" text-anchor="end">Outbound</text>
  <text x="540" y="178" fill="#475569" text-anchor="end">DB / APIs</text>
</svg>