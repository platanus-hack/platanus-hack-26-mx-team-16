name: owliver-backend

services:
  admin:
    image: directus/directus:12.0.2
    restart: unless-stopped
    ports:
      - "8055:8055"
    volumes:
      - ./admin/database:/directus/database
      - ./admin/uploads:/directus/uploads
      - ./admin/extensions:/directus/extensions
    environment:
      # Dev defaults via ${VAR:-default}: local `docker compose up` still works,
      # and real values are injected from the environment (Infisical) — no fixed
      # secret literals committed to the repo.
      SECRET: "${DIRECTUS_SECRET:-dev-only-change-me}"
      ADMIN_EMAIL: "team@owliver.com"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD:-12345678x}"
      DB_CLIENT: "postgres"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: "postgres"
      DB_USER: "postgres"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      PUBLIC_URL: "http://localhost:8000"
      WEBSOCKETS_ENABLED: "true"
    develop:
      watch:
        - action: sync+restart
          path: ./admin/extensions
          target: /directus/extensions

  api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PROCESS_LABEL=api
      - MAILPIT_API_URL=http://mailpit:8025
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8200:8200"
    volumes:
      - .:/app
    command: /start

  worker:
    # SAQ background worker on the fat scanners image (dnsx / nuclei / testssl / …
    # + the Playwright agentic bridge). This is the SINGLE background processor:
    # the API is HTTP-only (docker/start-dev), so scans never land on the thin API
    # image that lacks the toolchain. Consolidated here (was the separate, easy-to-
    # forget docker-compose.scanners.yml) so it always runs with `docker compose up`.
    # No platform pin: build native so Playwright's Chromium runs un-emulated.
    build:
      context: .
      dockerfile: Dockerfile.scanners
      target: worker
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PROCESS_LABEL=workflow-worker
      - MAILPIT_API_URL=http://mailpit:8025
      # DooD scanners (ZAP) are launched by the HOST daemon and mount the scan dir
      # by HOST path — so the scan dir must be a host bind-mount, and the worker
      # must know its host path to build the sibling `-v`. Keep this byte-identical
      # to the bind-mount source below.
      - SCAN_DATA_HOST_DIR=${SCAN_DATA_HOST_DIR:-/tmp/owliver-scans}
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - .:/app
      # DooD (NEVER DinD): launch heavy sibling scanners via the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # Host bind-mount (NOT a named volume): ZAP siblings `-v ${SCAN_DATA_HOST_DIR}/{id}`
      # must resolve to this same host dir so they can write their report there.
      - ${SCAN_DATA_HOST_DIR:-/tmp/owliver-scans}:/data/scans
      - nuclei_templates:/root/nuclei-templates
    networks:
      - default
      - owliver_egress
    command: saq config.tasks.worker_settings

  hexstrike:
    # Heavy Kali-based MCP container — OFF by default (only with `--profile
    # hexstrike`). Joins egress only; never reaches postgres/redis (spec §10).
    image: hexstrike/hexstrike-ai:stable
    profiles: ["hexstrike"]
    environment:
      - HEXSTRIKE_PORT=8888
    networks:
      - owliver_egress

  postgres:
    image: postgres:17
    ports:
      - "5434:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=2MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  redis:
    image: redis:7
    ports:
      - "6791:6379"

  minio:
    image: quay.io/minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./public:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"

  mailpit:
    image: axllent/mailpit
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true
    ports:
      - "8027:8025"
      - "1027:1025"

volumes:
  postgres_data:
  scan_data:
  nuclei_templates:

networks:
  # Untrusted scanner siblings (DooD: `docker run --network owliver_egress …`) and
  # the optional hexstrike container run here, isolated from postgres/redis which
  # stay on the default network. The literal `name:` avoids the compose project
  # prefix so the worker's `docker run --network owliver_egress` resolves it.
  owliver_egress:
    name: owliver_egress
    driver: bridge
