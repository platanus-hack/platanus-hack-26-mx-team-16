# ruff.toml
# https://docs.astral.sh/ruff/

# ============================================================================
# CONFIGURACIÓN GENERAL
# ============================================================================

# Longitud de línea estándar
line-length = 119

# Versión de Python objetivo
target-version = "py313"

# Directorios a excluir
exclude = [
    ".git",
    ".mypy_cache",
    ".ruff_cache",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    "migrations",  # Alembic migrations
    "node_modules",
]

# ============================================================================
# LINTING
# ============================================================================

[lint]
# Reglas habilitadas
select = [
    # Esenciales
    "E",      # pycodestyle errors
    "F",      # Pyflakes
    "I",      # isort
    "UP",     # pyupgrade

    # Calidad de código
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "PIE",    # flake8-pie
    "RET",    # flake8-return
    "PTH",    # flake8-use-pathlib
    "PERF",   # Perflint (anti-patrones de performance)

    # Seguridad
    "S",      # flake8-bandit

    # Type checking y anotaciones
    "ANN",    # flake8-annotations (forzar type hints)
    "TCH",    # flake8-type-checking (optimización de imports)
    "FA",     # flake8-future-annotations
    "PYI",    # flake8-pyi (archivos stub)

    # Checks adicionales
    "A",      # flake8-builtins
    "ARG",    # flake8-unused-arguments
    "DTZ",    # flake8-datetimez
    "EM",     # flake8-errmsg
    "G",      # flake8-logging-format
    "N",      # pep8-naming
    "PL",     # Pylint
    "RSE",    # flake8-raise
    "T10",    # flake8-debugger
    "T20",    # flake8-print
    "TID",    # flake8-tidy-imports
    "RUF",    # Reglas específicas de Ruff
]

# Ignorar reglas específicas
ignore = [
    # Seguridad
    "S101",    # assert usado (común en tests)
    "S105",    # hardcoded password (falsos positivos)
    "S311",    # generadores pseudo-random (ok para uso no-crypto)

    # Naming
    "A003",    # builtin attribute shadowing
    "A002",    # builtin argument shadowing

    # Complejidad
    "PLR0913", # demasiados argumentos
    "PLR0912", # demasiadas ramas
    "PLR0915", # demasiados statements
    "C901",    # demasiado complejo

    # Type annotations
    "ANN401",  # Any está permitido cuando es necesario

    # Otros
    "B904",    # raise sin from
    "SIM105",  # contextlib.suppress
    "RET504",  # asignación innecesaria antes de return
    "TC001",   # imports para type checking
]

# Permitir autofix para todas las reglas
fixable = ["ALL"]
unfixable = ["B", "ERA"]  # No auto-remover bugbear y código comentado

# Variables no usadas con underscore
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# ============================================================================
# IGNORAR POR ARCHIVO
# ============================================================================

[lint.per-file-ignores]
# Archivos __init__.py
"__init__.py" = [
    "E402",  # Module import no al inicio
    "F401",  # Imports no usados (re-exports)
    "F403",  # Star imports
    "ANN",   # Type annotations no requeridas
]

# Tests
"tests/**/*.py" = [
    "S101",    # Uso de assert
    "ARG",     # Argumentos no usados (fixtures)
    "PLR2004", # Magic values
    "PLR0913", # Demasiados argumentos
    "ANN",     # Type annotations no requeridas
]

# Migraciones Alembic
"*/versions/*.py" = [
    "E501",  # Línea muy larga
    "ARG",   # Argumentos no usados
    "N999",  # Nombre de módulo inválido
    "ANN",   # Type annotations no requeridas
]

# Modelos SQLAlchemy
"*/database/models/**/*.py" = [
    "N811",  # Non-Constants imports
    "ANN",   # Type annotations pueden ser verbose
]

# Scripts
"scripts/**/*.py" = [
    "T20",   # Print statements permitidos
    "ANN",   # Type annotations no requeridas
]

# Endpoints FastAPI
"*/endpoints/*.py" = [
    "B008",   # function call en argument defaults (Depends es válido)
    "ANN201", # Missing return type (FastAPI infiere de response_model)
]

# ============================================================================
# CONFIGURACIÓN DE HERRAMIENTAS
# ============================================================================

# isort (ordenamiento de imports)
[lint.isort]
known-first-party = ["src"]

# flake8-tidy-imports
[lint.flake8-tidy-imports]
ban-relative-imports = "parents"  # Prohibir imports relativos de padres

# flake8-annotations
[lint.flake8-annotations]
allow-star-arg-any = true          # Permitir Any en *args y **kwargs
mypy-init-return = true            # Requerir __init__ -> None explícito
suppress-dummy-args = true         # Suprimir errores para args dummy
suppress-none-returning = false    # Requerir -> None

# flake8-type-checking
[lint.flake8-type-checking]
exempt-modules = ["typing", "typing_extensions"]
runtime-evaluated-base-classes = ["pydantic.BaseModel"]
strict = true

# pylint
[lint.pylint]
max-args = 8
max-branches = 12
max-returns = 6
max-statements = 50

# ============================================================================
# FORMATTER
# ============================================================================

[format]
# Usar comillas dobles
quote-style = "double"

# Indentar con espacios
indent-style = "space"

# Formatear código en docstrings
docstring-code-format = true

# Longitud de línea para código en docstrings
docstring-code-line-length = 88

# Magic trailing comma (compatibilidad con Black)
skip-magic-trailing-comma = false

# Line endings estilo Unix
line-ending = "auto"
