services:
  api:
    ports:
      - "5678:5678"
    command: >-
      bash -c "echo '[debug] starting uvicorn with debugpy on :5678...' ;
      python -Xfrozen_modules=off -m debugpy --listen 0.0.0.0:5678
      -m uvicorn config.main:app --host 0.0.0.0 --port 8200"

  # Jobs run in the worker (not the API), so the worker carries the debugger now.
  worker:
    ports:
      - "5679:5679"
    command: >-
      bash -c "echo '[debug] starting saq worker with debugpy on :5679...' ;
      python -Xfrozen_modules=off -m debugpy --listen 0.0.0.0:5679
      -m saq config.tasks.worker_settings"
