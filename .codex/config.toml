# Project-specific Codex configuration for Doxiq
# This extends the global ~/.codex/config.toml

[project]
name = "doxiq"
description = "Document extraction and business rule analysis platform"
root = "/Users/vic/Projects/llamitai/doxiq"

# MCP Servers (merged with global config)
[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp"]

[mcp_servers.codegraph.tools.codegraph_files]
approval_mode = "approve"

[mcp_servers.codegraph.tools.codegraph_explore]
approval_mode = "approve"

[mcp_servers.pencil]
command = "/Applications/Pencil.app/Contents/Resources/app.asar.unpacked/out/mcp-server-darwin-arm64"
args = ["--app", "desktop"]

[mcp_servers.shadcn]
command = "npx"
args = ["-y", "shadcn@latest", "mcp"]

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp"]

[mcp_servers.playwright.tools.browser_tabs]
approval_mode = "approve"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
env_http_headers = { "CONTEXT7_API_KEY" = "CONTEXT7_API_KEY" }

[mcp_servers.tailwindcss-server]
command = "npx"
args = ["-y", "tailwindcss-mcp"]

# Agent instructions
[agent]
instructions = "AGENTS.md"

# Skills directory
[skills]
directory = ".codex/skills"

# Rules directory
[rules]
directory = ".codex/rules"

# Trust level for this project
[projects."/Users/vic/Projects/llamitai/doxiq"]
trust_level = "trusted"
